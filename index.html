<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskMoney</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔐 LOGIN SCREEN -->
<div id="loginScreen" class="login">
  <h1>TaskMoney</h1>
  <p>Connecte-toi pour continuer</p>
  <button id="googleLogin">🔵 Se connecter avec Google</button>
</div>

<!-- 📱 APP SCREEN -->
<div id="app" style="display:none;">

<header>
  <h1>TaskMoney</h1>
  <p class="balance">💰 Solde : <span id="balance">0.00$</span></p>
</header>

<section class="card">
  <h2>📊 Statistiques</h2>
  <div class="stats">
    <div>📋 Tâches: 0</div>
    <div>💸 Gains: 0.00$</div>
    <div>👥 Amis: 0</div>
  </div>
</section>

<section class="card">
  <h2>🔥 Tâches populaires</h2>

  <div class="task">
    <p>Installer une application</p>
    <span>+0.25$</span>
    <button>Commencer</button>
  </div>

  <div class="task">
    <p>Créer un compte</p>
    <span>+0.15$</span>
    <button>Commencer</button>
  </div>

</section>

<nav class="menu">
  <button>🏠 Accueil</button>
  <button>📋 Tâches</button>
  <button>💰 Retrait</button>
  <button>👥 Parrainage</button>
  <button>👤 Profil</button>
</nav>

</div>

<script type="module" src="app.js"></script>
</body>
    </html>
